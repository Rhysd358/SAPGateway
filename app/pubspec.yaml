name: sap_gateway_app
description: Flutter web admin for the mock SAP ECC 6 gateway.
publish_to: none
version: 0.1.4

environment:
  sdk: ^3.4.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.0
  provider: ^6.1.0

flutter:
  uses-material-design: true
  # Bundle Roboto locally so canvaskit doesn't fetch it from fonts.gstatic.com
  # at runtime. Required for the air-gapped on-prem target — without this
  # the admin UI tries to download fonts on every page load. Material 3
  # already defaults fontFamily to "Roboto"; declaring it here makes Flutter
  # resolve to the bundled asset instead of the CDN.
  fonts:
    - family: Roboto
      fonts:
        - asset: fonts/Roboto/Roboto-Regular.ttf
        - asset: fonts/Roboto/Roboto-Medium.ttf
          weight: 500
        - asset: fonts/Roboto/Roboto-Bold.ttf
          weight: 700
